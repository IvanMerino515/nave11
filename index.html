          "name": "¿Qué es Nave11?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nave11 es el directorio cultural y gastronómico más completo del Distrito 11 de Carabanchel, Madrid. Recoge 56 espacios verificados: galerías de arte contemporáneo, naves industriales reconvertidas, estudios de artistas, salas de conciertos, bares históricos (algunos abiertos desde 1967), librerías independientes y comercios de barrio. Es un proyecto independiente, sin publicidad y sin patrocinadores."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuántos espacios culturales tiene Carabanchel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Carabanchel (Distrito 11 de Madrid) tiene más de 170 espacios culturales, aunque la mayoría están invisibilizados. Nave11 recoge 56 de los más relevantes, verificados y geolocalizados, incluyendo 14 galerías de arte contemporáneo, 3 naves multidisciplinares, 3 salas de conciertos y teatro, 5 bares históricos con décadas de historia, 4 librerías independientes y 6 bares castizos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué galerías de arte hay en Carabanchel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Carabanchel es el distrito con mayor concentración de galerías de arte contemporáneo de Madrid. Las principales son VETA by Fer Francés (la galería más grande de Madrid, con murales exteriores de gran formato), Sabrina Amrani (especializada en arte latinoamericano e internacional), Marquesa Gallery, La Gran, Benveniste Contemporary, 95 Art Gallery, Galería La Caja Negra y Lapislázuli Gallery, entre otras. La mayoría tienen entrada libre y se concentran en torno a la Calle Nicolás Morales y Avenida Pedro Diez."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo llegar a Carabanchel desde el centro de Madrid?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Carabanchel (Distrito 11) está a 15-20 minutos del centro de Madrid en metro. Las líneas principales son la Línea 5 (Carabanchel) con paradas en Oporto, Urgel y Aluche, y la Línea 11 (MetroSur) con paradas en Pan Bendito y La Peseta. En autobús, las líneas 23, 35, 55 y 60 conectan el distrito con el centro. El barrio es completamente transitable a pie entre los principales espacios culturales."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué es el Generador de Planes de Nave11?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Generador de Planes de Nave11 (disponible en nave11.app/planes) es una herramienta que propone rutas personalizadas por el Distrito 11 de Carabanchel en función de tus preferencias. Con 5 preguntas — tiempo disponible, tipo de cultura, compañía, bebida preferida y paradas opcionales de barrio — genera un itinerario con espacios culturales y gastronómicos ordenados geográficamente para recorrer a pie."
          }
        }

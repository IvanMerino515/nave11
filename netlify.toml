[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # Evita que la web se cargue en iframes de otros dominios (clickjacking)
    X-Frame-Options = "DENY"

    # Evita que el navegador adivine el tipo de archivo (MIME sniffing)
    X-Content-Type-Options = "nosniff"

    # Fuerza HTTPS durante 1 año, incluye subdominios
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Controla qué info se envía al navegar a otros sitios
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restringe acceso a funciones del navegador innecesarias
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    # - default: solo recursos propios
    # - scripts: propios + Google Fonts (solo CSS)
    # - estilos: propios + Google Fonts + inline (necesario para Leaflet)
    # - fuentes: propios + Google Fonts
    # - imágenes: propios + tiles del mapa (CartoDB/OpenStreetMap) + data URIs
    # - conexiones: propios + Leaflet tiles
    # - frames: ninguno
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache agresivo para assets con hash (Vite los genera con hash en el nombre)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirigir www a apex
[[redirects]]
  from = "https://www.nave11.app/*"
  to = "https://nave11.app/:splat"
  status = 301
  force = true

# SPA: todas las rutas al index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
